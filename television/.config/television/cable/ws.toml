[metadata]
name = "ws"
description = "Lists and interacts with workspaces"
requirements = ["sessionizer"]

# UI panel visibility (individual control)
[ui.preview_panel]
hidden = true

[ui.status_bar]
hidden = true

[ui.help_panel]
hidden = true

[ui.remote_control]
disabled = true

[source]
command = "sessionizer workspaces list"
no_sort = true
frecency = false


[keybindings]
enter = "actions:bare"
ctrl-b = "actions:bare"
ctrl-o = "actions:standard"
ctrl-k = "actions:remove"

[actions.bare]
description = "Enter workspace with bare checkout"
command = "sessionizer actions workspace-enter --bare {split: :-1}"
mode = "execute"

[actions.standard]
description = "Enter workspace (standard checkout)"
command = "sessionizer actions workspace-enter {split: :-1}"
mode = "execute"

[actions.remove]
description = "Removes a workspace"
command = "sessionizer workspace remove {split: :-1}"
mode = "execute"
