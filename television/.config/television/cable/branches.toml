[metadata]
name = "branches"
description = "Lists branches and workspaces"
requirements = ["sessionizer"]

# UI panel visibility (individual control)
[ui.preview_panel]
hidden = true

[ui.status_bar]
hidden = true

[ui.help_panel]
hidden = true

[ui.remote_control]
disabled = true

[source]
command = "sessionizer branches list"
no_sort = true
frecency = true

[keybindings]
enter = "actions:enter"

[actions.enter]
description = "Switch to branch, creates worktree in bare checkouts"
command = "sessionizer actions branch-enter {split: :-1}"
mode = "execute"
