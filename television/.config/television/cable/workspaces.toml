[metadata]
name = "workspaces"
description = "Lists and interacts with workspaces"
requirements = ["sessionizer"]

[source]
command = "sessionizer workspaces list"
no_sort = true
frecency = false

[keybindings]
enter = "actions:bare"
ctrl-b = "actions:bare"
ctrl-o = "actions:standard"

[actions.bare]
description = "Enter workspace with bare checkout"
command = "sessionizer actions workspace-enter --bare {split: :-1}"
mode = "execute"

[actions.standard]
description = "Enter workspace (standard checkout)"
command = "sessionizer actions workspace-enter {split: :-1}"
mode = "execute"
